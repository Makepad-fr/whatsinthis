name: Reusable Deploy Swarm

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: ghcr.io/makepad-fr/whatsinthis-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-backend-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Validate target environment
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.environment }}" in
            canary|production) ;;
            *)
              echo "Swarm deployment is only supported for canary and production." >&2
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Verify deployment image exists
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${IMAGE_NAME}:${{ inputs.image_tag }}"
          for attempt in $(seq 1 12); do
            if docker buildx imagetools inspect "${image_ref}" >/dev/null 2>&1; then
              exit 0
            fi
            echo "waiting for image ${image_ref} to become available (${attempt}/12)"
            sleep 10
          done
          docker buildx imagetools inspect "${image_ref}"

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Prepare swarm bundle
        id: prep
        shell: bash
        env:
          DEPLOY_APP_NETWORK: ${{ secrets.DEPLOY_APP_NETWORK }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          release_tag="$(
            printf '%s' "${IMAGE_TAG}" \
              | tr -cs 'a-zA-Z0-9' '-' \
              | sed 's/^-*//; s/-*$//' \
              | cut -c1-12
          )"
          if [[ -z "${release_tag}" ]]; then
            release_tag="image"
          fi
          release_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${release_tag}"
          case "${{ inputs.environment }}" in
            canary) secret_prefix="wit_c" ;;
            production) secret_prefix="wit_p" ;;
          esac
          database_secret_name="${secret_prefix}_db_${release_id}"
          usda_secret_name="${secret_prefix}_usda_${release_id}"
          for secret_name in "${database_secret_name}" "${usda_secret_name}"; do
            if ((${#secret_name} > 64)); then
              echo "Generated Docker secret name exceeds 64 characters: ${secret_name}" >&2
              exit 1
            fi
          done

          stack_root="${RUNNER_TEMP}/stack-bundle"
          env_dir="${stack_root}/deploy/envs/${{ inputs.environment }}"
          mkdir -p "${env_dir}"
          cp deploy/compose.yml "${stack_root}/deploy/compose.yml"
          cp "deploy/envs/${{ inputs.environment }}/compose.yml" "${env_dir}/compose.yml"
          cp "deploy/envs/${{ inputs.environment }}/.env.app" "${env_dir}/.env.app"
          cat > "${env_dir}/.env.deploy" <<EOF
          WHATSINTHIS_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}
          DEPLOY_APP_NETWORK=${DEPLOY_APP_NETWORK}
          WHATSINTHIS_DATABASE_URL_SECRET=${database_secret_name}
          WHATSINTHIS_USDA_API_KEY_SECRET=${usda_secret_name}
          EOF

          {
            echo "database_secret_name=${database_secret_name}"
            echo "usda_secret_name=${usda_secret_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create swarm secrets
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DATABASE_URL: ${{ secrets.WHATSINTHIS_DATABASE_URL }}
          USDA_API_KEY: ${{ secrets.WHATSINTHIS_USDA_API_KEY }}
          DATABASE_SECRET_NAME: ${{ steps.prep.outputs.database_secret_name }}
          USDA_SECRET_NAME: ${{ steps.prep.outputs.usda_secret_name }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?}" "${REMOTE_USER:?}" "${DATABASE_URL:?}"
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          printf '%s' "${DATABASE_URL}" | ssh "${ssh_opts[@]}" "${remote_target}" \
            docker secret create --label app=whatsinthis --label "environment=${{ inputs.environment }}" "${DATABASE_SECRET_NAME}" - >/dev/null
          printf '%s' "${USDA_API_KEY}" | ssh "${ssh_opts[@]}" "${remote_target}" \
            docker secret create --label app=whatsinthis --label "environment=${{ inputs.environment }}" "${USDA_SECRET_NAME}" - >/dev/null

      - name: Deploy via Docker Swarm
        shell: bash
        env:
          STACK_ROOT: ${{ runner.temp }}/stack-bundle
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          STACK_NAME: ${{ secrets.DEPLOY_STACK_NAME }}
          GHCR_USERNAME: ${{ secrets.DEPLOY_GHCR_USERNAME || secrets.GHCR_PULL_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN || secrets.GHCR_PULL_TOKEN || github.token }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?}" "${REMOTE_USER:?}" "${REMOTE_DIR:?}" "${STACK_ROOT:?}" "${STACK_NAME:?}" "${GHCR_USERNAME:?}" "${GHCR_TOKEN:?}"
          REMOTE_PORT=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${REMOTE_PORT}")
          scp_opts=(-o StrictHostKeyChecking=accept-new -P "${REMOTE_PORT}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          ssh "${ssh_opts[@]}" "${remote_target}" mkdir -p "${REMOTE_DIR}/deploy/envs/${{ inputs.environment }}"
          scp "${scp_opts[@]}" "${STACK_ROOT}/deploy/compose.yml" "${remote_target}:${REMOTE_DIR}/deploy/compose.yml"
          scp "${scp_opts[@]}" "${STACK_ROOT}/deploy/envs/${{ inputs.environment }}/compose.yml" "${remote_target}:${REMOTE_DIR}/deploy/envs/${{ inputs.environment }}/compose.yml"
          scp "${scp_opts[@]}" "${STACK_ROOT}/deploy/envs/${{ inputs.environment }}/.env.app" "${remote_target}:${REMOTE_DIR}/deploy/envs/${{ inputs.environment }}/.env.app"
          scp "${scp_opts[@]}" "${STACK_ROOT}/deploy/envs/${{ inputs.environment }}/.env.deploy" "${remote_target}:${REMOTE_DIR}/deploy/envs/${{ inputs.environment }}/.env.deploy"

          printf '%s' "${GHCR_TOKEN}" \
            | ssh "${ssh_opts[@]}" "${remote_target}" docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${REMOTE_DIR}" "${STACK_NAME}" "${{ inputs.environment }}" "${IMAGE_NAME}:${{ inputs.image_tag }}" <<'EOF'
          set -euo pipefail
          remote_dir=$1
          stack_name=$2
          deploy_env=$3
          image_ref=$4
          env_dir="${remote_dir}/deploy/envs/${deploy_env}"
          env_app="${env_dir}/.env.app"
          env_deploy="${env_dir}/.env.deploy"
          app_network=$(grep '^DEPLOY_APP_NETWORK=' "${env_deploy}" | tail -n 1 | cut -d= -f2-)

          case "${deploy_env}" in
            canary) secret_prefixes=('wit_c_db_' 'wit_c_usda_') ;;
            production) secret_prefixes=('wit_p_db_' 'wit_p_usda_') ;;
          esac

          docker network inspect "${app_network}" >/dev/null 2>&1 \
            || docker network create --driver overlay --attachable "${app_network}"

          for attempt in {1..12}; do
            if docker pull "${image_ref}" >/dev/null 2>&1; then
              break
            fi
            if (( attempt == 12 )); then
              echo "Timed out waiting for ${image_ref} to be pullable on ${HOSTNAME}." >&2
              exit 1
            fi
            sleep 10
          done

          docker compose \
            --env-file "${env_app}" \
            --env-file "${env_deploy}" \
            -f "${remote_dir}/deploy/compose.yml" \
            -f "${env_dir}/compose.yml" \
            config | sed '/^name: /d' > "${remote_dir}/stack.yml"

          docker stack deploy --with-registry-auth --compose-file "${remote_dir}/stack.yml" "${stack_name}"

          mapfile -t stack_services < <(docker stack services "${stack_name}" --format '{{.Name}}')
          for service in "${stack_services[@]}"; do
            deadline=$((SECONDS + 180))
            while (( SECONDS < deadline )); do
              replicas=$(docker service ls --filter "name=${service}" --format '{{.Replicas}}')
              desired=${replicas#*/}
              running=${replicas%%/*}
              update_state=$(docker service inspect "${service}" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{end}}')
              update_message=$(docker service inspect "${service}" --format '{{if .UpdateStatus}}{{.UpdateStatus.Message}}{{end}}')

              if [[ "${update_state}" == rollback_* ]]; then
                echo "Service ${service} rolled back: ${update_message}" >&2
                docker service ps "${service}" --no-trunc >&2 || true
                exit 1
              fi
              if [[ -n "${desired}" && "${desired}" != "0" && "${running}" == "${desired}" ]]; then
                break
              fi
              sleep 5
            done
            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for ${service} to reach ${desired} replicas." >&2
              docker service ps "${service}" --no-trunc >&2 || true
              exit 1
            fi
          done

          for prefix in "${secret_prefixes[@]}"; do
            mapfile -t old_secrets < <(
              docker secret ls --format '{{.Name}}' \
                | grep "^${prefix}" \
                | sort -r
            )
            if ((${#old_secrets[@]} > 2)); then
              for secret in "${old_secrets[@]:2}"; do
                docker secret rm "${secret}" >/dev/null 2>&1 || true
              done
            fi
          done
          EOF
