name: Push Main

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/makepad-fr/whatsinthis-backend
  VERSION: ${{ github.sha }}
  VCS_REF: ${{ github.sha }}
  CACHE_REF: ghcr.io/makepad-fr/whatsinthis-backend:buildcache

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      app_changed: ${{ steps.changes.outputs.app_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed scopes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD^)"
          fi

          changed_files="$(git diff --name-only "${base}" "${GITHUB_SHA}")"
          backend_changed=false
          app_changed=false

          while IFS= read -r file; do
            case "$file" in
              backend/*|Dockerfile|docker-bake.hcl|compose*.yml|deploy/*|deploy/**|.dockerignore|.github/workflows/_reusable-deploy-swarm.yml|.github/workflows/push-main.yml)
                backend_changed=true
                ;;
            esac
            case "$file" in
              whatsinthis/*|whatsinthis/**|whatsinthisTests/*|whatsinthisTests/**|whatsinthisUITests/*|whatsinthisUITests/**|whatsinthis.xcodeproj/*|whatsinthis.xcodeproj/**|scripts/testflight-upload.sh|.github/workflows/push-main.yml)
                app_changed=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "backend_changed=${backend_changed}" >> "${GITHUB_OUTPUT}"
          echo "app_changed=${app_changed}" >> "${GITHUB_OUTPUT}"
          printf 'Changed files:\n%s\n' "${changed_files}"

  publish-backend:
    needs: prepare
    if: needs.prepare.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hardened Images
        shell: bash
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${DHI_USERNAME}" && -n "${DHI_TOKEN}" ]]; then
            printf '%s' "${DHI_TOKEN}" | docker login dhi.io -u "${DHI_USERNAME}" --password-stdin
          else
            echo "DHI_USERNAME/DHI_TOKEN not set; assuming runner already has access to dhi.io"
          fi

      - name: Build and push canary image
        uses: docker/bake-action@v6
        env:
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ env.VERSION }}
          VCS_REF: ${{ env.VCS_REF }}
        with:
          source: .
          files: docker-bake.hcl
          targets: publish
          set: |
            publish.cache-from=type=registry,ref=${{ env.CACHE_REF }}
            publish.cache-to=type=registry,ref=${{ env.CACHE_REF }},mode=max
            publish.push=true

  deploy-backend-canary:
    needs:
      - prepare
      - publish-backend
    if: needs.prepare.outputs.backend_changed == 'true'
    uses: ./.github/workflows/_reusable-deploy-swarm.yml
    permissions:
      contents: read
      packages: read
    with:
      environment: canary
      image_tag: ${{ github.sha }}
    secrets: inherit

  ios-testflight-canary:
    needs: prepare
    if: needs.prepare.outputs.app_changed == 'true'
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Upload canary build to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ vars.APP_STORE_CONNECT_API_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUILD_NUMBER: ${{ github.run_id }}
          PRUNE_API_CREATED_IOS_DEVELOPMENT_CERTIFICATES: "true"
          TESTFLIGHT_ENVIRONMENT: canary
          WHATSINTHIS_BACKEND_BASE_URL: ${{ vars.WHATSINTHIS_CANARY_BACKEND_BASE_URL || secrets.WHATSINTHIS_CANARY_BACKEND_BASE_URL }}
        run: ./scripts/testflight-upload.sh

      - name: Upload release artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-canary-testflight-artifacts
          path: |
            build/whatsinthis.xcarchive
            build/testflight-export
            build/testflight-export-options.plist
          if-no-files-found: ignore
