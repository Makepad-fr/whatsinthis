services:
  backend:
    image: ${WHATSINTHIS_IMAGE:-whatsinthis-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "${WHATSINTHIS_HTTP_PORT:-8080}:8080"
    environment:
      WHATSINTHIS_HTTP_ADDR: :8080
      WHATSINTHIS_DATABASE_URL: ${WHATSINTHIS_DATABASE_URL:-postgres://whatsinthis:whatsinthis@db:5432/whatsinthis?sslmode=disable}
      WHATSINTHIS_USDA_API_KEY: ${WHATSINTHIS_USDA_API_KEY:-}
    depends_on:
      - db
    networks:
      app:
      db:

networks:
  app:
  db:
